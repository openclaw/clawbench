profile: clawbench-check
provider: aws
class: standard
capacity:
  market: spot
  strategy: most-available
  fallback: on-demand-after-120s
  hints: true
  regions:
    - eu-west-1
actions:
  workflow: .github/workflows/crabbox-hydrate.yml
  job: hydrate
  ref: main
  runnerLabels:
    - crabbox
    - clawbench
  runnerVersion: latest
  ephemeral: true
aws:
  region: eu-west-1
  rootGB: 400
sync:
  delete: true
  checksum: false
  gitSeed: true
  fingerprint: true
  baseRef: main
  exclude:
    - .artifacts
    - .codex
    - .DS_Store
    - .pytest_cache
    - .ruff_cache
    - .venv
    - dist
    - htmlcov
    - playwright-report
    - test-results
env:
  allow:
    - CI
    - CLAWBENCH_*
    - OPENCLAW_*
    - PYTHON*
ssh:
  user: crabbox
  port: "2222"
