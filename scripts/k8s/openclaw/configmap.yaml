apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token"
        }
      },
      "browser": {
        "enabled": true,
        "headless": true,
        "noSandbox": true,
        "ssrfPolicy": {
          "allowedHostnames": ["localhost", "127.0.0.1"]
        }
      },
      "tools": {
        "profile": "coding",
        "alsoAllow": ["browser"]
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace"
        }
      },
      "cron": { "enabled": false }
    }
