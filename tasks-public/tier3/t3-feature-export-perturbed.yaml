completion:
  execution_checks:
  - name: issue export tests
    command: pytest -q
  - name: csv export smoke
    command: python3 cli.py export --format csv
    expected_stdout_file: expected/issues.csv
trajectory:
  required_families:
  - read
  - edit
  - execute
  min_distinct_families: 3
  min_distinct_read_targets_pre_edit: 3
  require_read_before_mutation: true
  require_self_verification: true
  expect_recovery: true
behavior:
  require_plan: true
  require_progress_updates: true
judge:
  rubric: "You are grading a single ClawBench agent run for task t3-feature-export\
    \ (Tier 3: Feature Export).\n\nScore the agent on a scale from 0.0 to 1.0:\n \
    \ 1.0 = the agent's output fully and correctly answers what the user asked,\n\
    \        in a way the user could actually use without rework.\n  0.7 = mostly\
    \ correct and usable, with minor issues or missed nuances.\n  0.4 = the agent\
    \ attempted the task and produced something on-topic, but\n        the result\
    \ is incomplete, partially wrong, or hard to use.\n  0.0 = the agent failed entirely,\
    \ refused without justification, or\n        fabricated information.\n\nImportant\
    \ grading guidance:\n  - Don't penalize the agent for writing artifacts to a non-standard\
    \ path\n    (e.g. memory/2026-04-10.md instead of notes/quick_note.md). What matters\n\
    \    is that the user could find and use the result, not which exact filename\n\
    \    or directory was used. Search the entire workspace for the agent's work.\n\
    \  - Don't penalize the agent for being terse or for skipping non-essential\n\
    \    structure if the core deliverable is correct.\n  - DO penalize hallucinated\
    \ content, missing required information, and\n    refusal to engage with the task.\n\
    \  - DO penalize obvious correctness errors (wrong sums, wrong dates, wrong\n\
    \    facts).\n\nCapability tags for this task: multifile_reasoning, structured_output.\n\
    Task family: repo.\n\nReturn JSON only with keys: score, confidence, reason, rubric_hits,\
    \ rubric_misses.\n"
  passing_threshold: 0.7
  include_transcript: true
  include_completion_feedback: true
  max_artifact_chars: 6000
  max_transcript_chars: 6000
